<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HookahLab</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0e0c14;--bg2:#161320;--bg3:#1e1b2c;--bg4:#272438;--bg5:#302d44;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f0edf8;--text2:#8a879f;--text3:#4a4862;
  --gold:#e8a23b;--gold2:#ffd280;--purple:#9d6fff;--purple2:#7c4fd6;
  --teal:#3dd6ac;--red:#f06b6b;--green:#4ade80;
  --nav-h:68px;--radius:20px;--radius-sm:12px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative}
.page{flex:1;overflow-y:auto;overflow-x:hidden;display:none;scrollbar-width:none}
.page::-webkit-scrollbar{display:none}
.page.active{display:block}
.page-inner{padding-bottom:calc(var(--nav-h)+16px)}

/* ── TOP BAR ── */
.top-bar{position:sticky;top:0;z-index:50;padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between;background:rgba(14,12,20,0.9);backdrop-filter:blur(20px)}
.logo{font-size:1.25rem;font-weight:700;background:linear-gradient(135deg,var(--gold),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.95rem;color:var(--text2);transition:all 0.2s}
.icon-btn:hover{background:var(--bg4)}

/* ── NAV ── */
.bottom-nav{height:var(--nav-h);background:rgba(22,19,32,0.95);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:10px;flex-shrink:0;backdrop-filter:blur(20px)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;transition:all 0.2s;position:relative}
.nav-icon{font-size:1.35rem;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1)}
.nav-label{font-size:0.63rem;font-weight:500;color:var(--text3);transition:color 0.2s;letter-spacing:0.3px}
.nav-item.active .nav-icon{transform:scale(1.18)}
.nav-item.active .nav-label{color:var(--gold)}
.nav-item.active::before{content:'';position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:28px;height:3px;background:linear-gradient(90deg,var(--gold),var(--purple));border-radius:0 0 4px 4px}

/* ── CARD ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}

/* ── STORIES ── */
.stories{padding:10px 0 10px 16px;display:flex;gap:12px;overflow-x:auto;scrollbar-width:none}
.stories::-webkit-scrollbar{display:none}
.story{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex-shrink:0}
.story-ring{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--purple));padding:2.5px}
.story-ring.seen{background:var(--bg4)}
.story-avatar{width:100%;height:100%;border-radius:50%;background:var(--bg3);border:2px solid var(--bg2);display:flex;align-items:center;justify-content:center;font-size:1.25rem}
.story-name{font-size:0.61rem;color:var(--text2);max-width:58px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── FEED POST ── */
.feed-post{margin:0 16px 14px}
.post-header{display:flex;align-items:center;gap:10px;padding:13px 13px 9px}
.post-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0;border:1.5px solid var(--border2)}
.post-username{font-size:0.88rem;font-weight:600}
.post-time{font-size:0.7rem;color:var(--text3)}

/* Mix card in post */
.mix-card-inner{margin:0 13px;background:var(--bg3);border-radius:14px;border:1px solid var(--border);overflow:hidden}
.mcx-head{padding:13px 14px 9px;background:linear-gradient(135deg,rgba(157,111,255,0.14),rgba(61,214,172,0.07))}
.mcx-name{font-size:1.05rem;font-weight:700;letter-spacing:-0.3px}
.mcx-desc{font-size:0.76rem;color:var(--text2);margin-top:3px;line-height:1.4}
.mcx-tags{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.mcx-tag{font-size:0.63rem;padding:2px 8px;border-radius:50px;background:rgba(255,255,255,0.07);color:var(--text2)}
.mcx-body{padding:11px 14px;display:flex;gap:14px;align-items:center}
.mcx-tobaccos{flex:1;display:flex;flex-direction:column;gap:4px}
.mcx-tob{display:flex;align-items:center;gap:6px;font-size:0.73rem}
.mcx-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.mcx-tob-name{flex:1}
.mcx-tob-pct{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--text3)}
.mcx-footer{padding:9px 14px;border-top:1px solid var(--border);display:flex;gap:12px;font-size:0.72rem;color:var(--text3)}

/* Post actions */
.post-actions{display:flex;gap:6px;padding:9px 13px 13px}
.act-btn{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:50px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:0.78rem;font-weight:500;cursor:pointer;transition:all 0.2s;font-family:inherit}
.act-btn:hover{background:var(--bg4)}
.act-btn.liked{background:rgba(232,162,59,0.12);border-color:rgba(232,162,59,0.3);color:var(--gold)}
.act-btn.saved{background:rgba(157,111,255,0.12);border-color:rgba(157,111,255,0.3);color:var(--purple)}

/* ── LAB ── */
.lab-wrap{padding:0 16px 32px}
.lab-name-input{width:100%;background:transparent;border:none;outline:none;font-family:'Space Grotesk',sans-serif;font-size:1.55rem;font-weight:700;color:var(--text);letter-spacing:-0.5px;padding:14px 0 4px;caret-color:var(--gold)}
.lab-name-input::placeholder{color:var(--text3)}
.lab-slabel{font-size:0.7rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:9px}

/* Bowl area */
.lab-bowl-area{display:flex;gap:14px;align-items:flex-start;margin-bottom:20px}
.bowl-vis-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:8px}
.bowl-svg-container{position:relative;width:172px;height:172px}
#bowlSvg{width:172px;height:172px;filter:drop-shadow(0 0 24px rgba(157,111,255,0.18))}
.bowl-empty-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:0.75rem;color:var(--text3);text-align:center;line-height:1.6;pointer-events:none}
.bowl-size-toggle{display:flex;border:1px solid var(--border);border-radius:50px;overflow:hidden;background:var(--bg3)}
.bowl-size-btn{padding:5px 12px;font-family:inherit;font-size:0.72rem;font-weight:600;color:var(--text3);background:transparent;border:none;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.bowl-size-btn.active{background:var(--bg5);color:var(--text)}

/* Pack methods */
.pack-methods{flex:1;display:flex;flex-direction:column;gap:5px}
.pack-btn{padding:8px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg3);display:flex;align-items:center;gap:7px;cursor:pointer;transition:all 0.2s}
.pack-btn.active{border-color:var(--purple);background:rgba(157,111,255,0.1)}
.pack-btn-icon{font-size:0.95rem;flex-shrink:0}
.pack-btn-name{font-size:0.8rem;font-weight:600}
.pack-btn-hint{font-size:0.65rem;color:var(--text3);margin-top:1px}

/* Tobacco list */
.tob-list{display:flex;flex-direction:column;gap:9px;margin-bottom:11px}
.tob-item{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:11px 13px}
.tob-item-top{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.tob-cdot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.tob-name{flex:1;font-size:0.86rem;font-weight:600}
.tob-brand{font-size:0.7rem;color:var(--text3)}
.tob-grams{font-family:'JetBrains Mono',monospace;font-size:0.85rem;color:var(--gold);font-weight:500}
.tob-rm{width:20px;height:20px;border-radius:50%;background:var(--bg4);border:none;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.7rem;flex-shrink:0;transition:all 0.2s}
.tob-rm:hover{background:rgba(240,107,107,0.2);color:var(--red)}
.tob-pct-row{display:flex;align-items:center;gap:8px}
.pct-val{font-family:'JetBrains Mono',monospace;font-size:0.85rem;min-width:34px;text-align:right}
.pct-slider{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:4px;outline:none;cursor:pointer;background:var(--bg5)}
.pct-slider::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;border-radius:50%;cursor:grab;box-shadow:0 2px 8px rgba(0,0,0,0.5);border:2px solid var(--bg3)}
.pct-slider::-webkit-slider-thumb:active{cursor:grabbing;transform:scale(1.3)}
.pct-remaining{font-size:0.73rem;color:var(--text3);display:flex;align-items:center;gap:6px;margin-bottom:9px}
.pct-remaining.over{color:var(--red)}
.pct-remaining.full{color:var(--teal)}
.pct-gauge{height:3px;border-radius:3px;background:var(--bg4);overflow:hidden;flex:1}
.pct-gauge-fill{height:100%;background:var(--teal);border-radius:3px;transition:all 0.3s}
.pct-gauge-fill.over{background:var(--red)}

.add-tob-btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:11px;background:var(--bg3);border:1px dashed rgba(157,111,255,0.3);border-radius:14px;color:var(--purple);font-family:inherit;font-size:0.86rem;font-weight:600;cursor:pointer;width:100%;transition:all 0.2s}
.add-tob-btn:hover{background:rgba(157,111,255,0.08);border-color:var(--purple)}

.lab-details{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:15px}
.det-card{background:var(--bg3);border:1px solid var(--border);border-radius:13px;padding:11px 13px}
.det-label{font-size:0.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:3px}
.det-val{font-size:0.86rem;font-weight:600}
.str-pips{display:flex;gap:3px;margin-top:5px}
.str-pip{flex:1;height:3px;border-radius:2px;background:var(--bg5);transition:background 0.3s}

.lab-save-row{display:flex;gap:9px}
.lab-btn{flex:1;padding:13px;border-radius:14px;font-family:inherit;font-size:0.93rem;font-weight:700;cursor:pointer;border:none;transition:all 0.2s}
.lab-btn-primary{background:linear-gradient(135deg,var(--purple2),var(--purple));color:#fff;box-shadow:0 4px 20px rgba(157,111,255,0.25)}
.lab-btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(157,111,255,0.35)}
.lab-btn-secondary{background:var(--bg3);border:1px solid var(--border);color:var(--text2)}

/* ── PROFILE ── */
.profile-cover{height:130px;background:linear-gradient(135deg,#140d2a 0%,#0c1825 50%,#140d2a 100%);position:relative;overflow:hidden}
.profile-cover-art{position:absolute;inset:0;opacity:0.2}
.profile-cover::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,var(--bg))}
.profile-info{padding:0 20px 14px;position:relative;margin-top:-38px}
.p-avatar{width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,var(--purple2),var(--gold));border:3px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:1.9rem;margin-bottom:10px}
.p-name{font-size:1.2rem;font-weight:700;letter-spacing:-0.4px}
.p-handle{font-size:0.79rem;color:var(--text3);margin-bottom:8px}
.p-bio{font-size:0.83rem;color:var(--text2);line-height:1.5;margin-bottom:12px}
.p-stats{display:flex;gap:20px;margin-bottom:14px}
.stat-n{font-size:1.05rem;font-weight:700}
.stat-l{font-size:0.65rem;color:var(--text3)}
.p-edit-btn{width:100%;padding:9px;background:var(--bg3);border:1px solid var(--border2);border-radius:50px;color:var(--text);font-family:inherit;font-size:0.86rem;font-weight:600;cursor:pointer;transition:all 0.2s;margin-bottom:14px}
.p-edit-btn:hover{background:var(--bg4)}

.p-section{padding:0 16px;margin-bottom:18px}
.p-section-title{font-size:0.75rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between}
.p-section-add{font-size:0.73rem;color:var(--purple);cursor:pointer;font-weight:600;text-transform:none;letter-spacing:0}

.setup-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;gap:9px}
.setup-row{display:flex;align-items:center;gap:9px}
.setup-ico{font-size:1.05rem;width:30px;text-align:center;flex-shrink:0}
.setup-lbl{font-size:0.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.4px}
.setup-v{font-size:0.86rem;font-weight:500}
.setup-v.empty{color:var(--text3);font-style:italic;font-weight:400}

.tob-cabinet{display:flex;flex-wrap:wrap;gap:7px}
.tob-chip{padding:5px 11px;background:var(--bg3);border:1px solid var(--border);border-radius:50px;font-size:0.73rem;display:flex;align-items:center;gap:5px;cursor:pointer;transition:all 0.2s}
.tob-chip:hover{border-color:var(--purple)}
.tob-chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

.mix-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px}
.mix-grid-item{aspect-ratio:1;background:var(--bg3);position:relative;cursor:pointer;overflow:hidden}
.mix-grid-item svg{width:100%;height:100%}
.mix-grid-overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:5px;background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 55%)}
.mix-grid-name{font-size:0.6rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── AUTH ── */
.auth-cta{padding:40px 20px;text-align:center}
.auth-cta h2{font-size:1.55rem;font-weight:700;margin-bottom:8px;letter-spacing:-0.5px}
.auth-cta p{color:var(--text2);font-size:0.88rem;margin-bottom:24px;line-height:1.6}
.btn-gold{padding:13px;background:linear-gradient(135deg,var(--gold2),var(--gold));color:#000;border:none;border-radius:50px;font-family:inherit;font-size:0.93rem;font-weight:700;cursor:pointer;transition:all 0.2s;width:100%}
.btn-gold:hover{transform:translateY(-1px)}
.btn-ghost{padding:13px;background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:50px;font-family:inherit;font-size:0.93rem;cursor:pointer;transition:all 0.2s;width:100%}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(10px);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--bg2);border:1px solid var(--border);border-radius:26px 26px 0 0;width:100%;max-width:480px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;animation:slideUp 0.32s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:34px;height:4px;background:var(--bg5);border-radius:2px;margin:11px auto 0}
.modal-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.modal-header h3{font-size:1.05rem;font-weight:700}
.modal-close{width:30px;height:30px;border-radius:50%;background:var(--bg3);border:none;color:var(--text2);font-size:0.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.modal-body{padding:14px 18px;flex:1;overflow-y:auto}

.search-wrap{position:relative;margin-bottom:11px}
.search-inp{width:100%;padding:10px 13px 10px 38px;background:var(--bg3);border:1px solid var(--border);border-radius:50px;color:var(--text);font-family:inherit;font-size:0.88rem;outline:none;transition:border-color 0.2s}
.search-inp:focus{border-color:var(--purple)}
.search-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:0.88rem}
.search-res{display:flex;flex-direction:column;gap:2px}
.search-item{padding:10px 13px;border-radius:11px;cursor:pointer;transition:background 0.15s;display:flex;align-items:center;gap:9px}
.search-item:hover{background:var(--bg3)}
.search-item-ico{width:34px;height:34px;border-radius:9px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:0.88rem;flex-shrink:0}
.search-item-name{font-size:0.86rem;font-weight:600}
.search-item-brand{font-size:0.7rem;color:var(--text3)}
.search-item-badge{font-size:0.62rem;padding:2px 7px;border-radius:50px;background:rgba(255,255,255,0.07);color:var(--text2);flex-shrink:0}
.search-item-rating{font-size:0.7rem;color:var(--gold);flex-shrink:0}

.auth-tabs{display:flex;border:1px solid var(--border);border-radius:50px;margin-bottom:18px;overflow:hidden}
.auth-tab{flex:1;padding:8px;text-align:center;font-size:0.83rem;font-weight:600;cursor:pointer;color:var(--text3);transition:all 0.2s;background:transparent;border:none;font-family:inherit}
.auth-tab.active{background:var(--bg4);color:var(--text)}
.form-field{margin-bottom:11px}
.form-label{font-size:0.68rem;color:var(--text3);margin-bottom:4px;display:block;font-weight:500;text-transform:uppercase;letter-spacing:0.4px}
.form-input{width:100%;padding:11px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:0.88rem;outline:none;transition:border-color 0.2s}
.form-input:focus{border-color:var(--purple)}
.form-error{font-size:0.78rem;color:var(--red);margin-top:6px;display:none}

.toast{position:fixed;bottom:calc(var(--nav-h)+14px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:9px 18px;border-radius:50px;font-size:0.83rem;font-weight:500;z-index:300;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text3);font-size:0.85rem;gap:8px}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app">

  <!-- ── FEED ── -->
  <div id="feedPage" class="page active">
    <div class="page-inner">
      <div class="top-bar">
        <span class="logo">HookahLab</span>
        <div style="display:flex;gap:7px">
          <button class="icon-btn" onclick="openAuth()">🔔</button>
        </div>
      </div>
      <div class="stories" id="storiesRow">
        <div class="story"><div class="story-ring"><div class="story-avatar">🧔</div></div><div class="story-name">smoke_v</div></div>
        <div class="story"><div class="story-ring"><div class="story-avatar">👨‍🍳</div></div><div class="story-name">kalyan_p</div></div>
        <div class="story"><div class="story-ring seen"><div class="story-avatar">🎨</div></div><div class="story-name">hookah_a</div></div>
        <div class="story"><div class="story-ring seen"><div class="story-avatar">🔬</div></div><div class="story-name">mix_lab</div></div>
        <div class="story"><div class="story-ring seen"><div class="story-avatar">👑</div></div><div class="story-name">vape_k</div></div>
      </div>
      <div id="feedList"><div class="loading"><div class="spinner"></div>Загрузка ленты...</div></div>
    </div>
  </div>

  <!-- ── LAB ── -->
  <div id="labPage" class="page">
    <div class="page-inner">
      <div class="top-bar">
        <h1 style="background:linear-gradient(135deg,var(--gold),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:1.3rem;font-weight:700">Лаборатория</h1>
      </div>
      <div class="lab-wrap">
        <input class="lab-name-input" id="labMixName" placeholder="Название микса..." maxlength="50">

        <div class="lab-bowl-area">
          <div class="bowl-vis-wrap">
            <div class="bowl-svg-container">

<script>
const API = '';  // same origin
const COLORS = ['#9d6fff','#e8a23b','#3dd6ac','#f472b6','#60a5fa','#fb923c','#f87171','#a78bfa','#34d399'];
const STR_MAP = {'лёгкий':1,'средне-лёгкий':1.5,'средний':3,'средне-крепкий':3.5,'крепкий':5};
const BRAND_ICONS = {'Must have':'🍋','Dark Side':'🌑','Burn Black':'🔥','Хулиган':'💥','Bonche':'🌸','Tangiers':'🌿','Satyr':'⚗️','DUFT':'🍇','Spectrum':'🌈','Adalya':'🌺','Muassel':'🫐','Северный':'❄️','Starline':'⭐'};

// ── STATE ──
let token = localStorage.getItem('hl_token');
let currentUser = JSON.parse(localStorage.getItem('hl_user') || 'null');
const lab = { mixName:'', bowlSize:20, packMethod:'секторами', tobaccos:[] };

// ── API HELPERS ──
async function api(path, method='GET', body=null) {
  const opts = { method, headers: { 'Content-Type':'application/json' } };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.detail || 'Ошибка');
  return data;
}

// ── NAVIGATION ──
function navigate(page, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(page + 'Page').classList.add('active');
  el.classList.add('active');
  if (page === 'profile') renderProfile();
  if (page === 'feed') loadFeed();
}

// ── BOWL SVG ──
function polar(cx, cy, r, deg) {
  const rad = (deg - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}
function arcPath(cx, cy, outerR, innerR, a1, a2) {
  if (a2 - a1 >= 359.9) a2 = a1 + 359.5;
  const o1=polar(cx,cy,outerR,a1), o2=polar(cx,cy,outerR,a2);
  const i1=polar(cx,cy,innerR,a2), i2=polar(cx,cy,innerR,a1);
  const lg = a2-a1 > 180 ? 1 : 0;
  return `M${o1.x} ${o1.y} A${outerR} ${outerR} 0 ${lg} 1 ${o2.x} ${o2.y} L${i1.x} ${i1.y} A${innerR} ${innerR} 0 ${lg} 0 ${i2.x} ${i2.y}Z`;
}

function renderBowl() {
  const svg = document.getElementById('bowlSvg');
  const empty = document.getElementById('bowlEmptyLabel');
  const cx=86,cy=86,outerR=76,innerR=26,rimR=84;
  const tobs = lab.tobaccos.filter(t => t.percentage > 0);
  let h = '';
  h += `<circle cx="${cx}" cy="${cy}" r="${rimR}" fill="#1c1929" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>`;
  h += `<circle cx="${cx}" cy="${cy}" r="${outerR}" fill="#161320"/>`;
  if (!tobs.length) {
    empty.style.display='flex';
  } else {
    empty.style.display='none';
    const total = tobs.reduce((s,t)=>s+t.percentage,0);
    const scale = Math.min(total,100)/100;
    if (lab.packMethod === 'секторами') {
      let a = -90;
      tobs.forEach(t => {
        const sw = (t.percentage/Math.max(total,100))*360;
        h += `<path d="${arcPath(cx,cy,outerR*scale,innerR,a,a+sw-1.5)}" fill="${t.color}" opacity="0.92"/>`;
        if (sw > 28) {
          const mp = polar(cx,cy,(outerR*scale+innerR)/2, a+sw/2);
          h += `<text x="${mp.x}" y="${mp.y}" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="rgba(255,255,255,0.75)" font-family="Space Grotesk">${t.percentage}%</text>`;
        }
        a += sw;
      });
    } else if (lab.packMethod === 'слоями') {
      const step = (outerR - innerR) / tobs.length;
      tobs.forEach((t,i) => {
        h += `<circle cx="${cx}" cy="${cy}" r="${(outerR-i*step)*scale}" fill="${t.color}" opacity="0.85"/>`;
      });
    } else if (lab.packMethod === 'компот') {
      let a = -90;
      tobs.forEach(t => {
        const sw = (t.percentage/Math.max(total,100))*360;
        h += `<path d="${arcPath(cx,cy,outerR*0.94,innerR,a,a+sw)}" fill="${t.color}" opacity="0.65"/>`;
        a += sw;
      });
      h += `<circle cx="${cx}" cy="${cy}" r="${outerR*0.94}" fill="rgba(0,0,0,0.15)"/>`;
    } else { // центр+края
      if (tobs[0]) h += `<circle cx="${cx}" cy="${cy}" r="${outerR*scale}" fill="${tobs[0].color}" opacity="0.85"/>`;
      if (tobs[1]) h += `<circle cx="${cx}" cy="${cy}" r="${outerR*0.42*scale}" fill="${tobs[1].color}" opacity="0.92"/>`;
    }
    h += `<circle cx="${cx}" cy="${cy}" r="${innerR}" fill="#161320"/>`;
    h += `<circle cx="${cx}" cy="${cy}" r="4" fill="rgba(255,255,255,0.08)"/>`;
    h += `<circle cx="${cx}" cy="${cy}" r="${innerR}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>`;
  }
  h += `<circle cx="${cx}" cy="${cy}" r="${rimR}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>`;
  svg.innerHTML = h;
}

// ── LAB ──
function setBowlSize(g, btn) {
  lab.bowlSize = g;
  document.querySelectorAll('.bowl-size-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('labBowlLbl').textContent = g===20?'Убивашка':'Фанел';
  renderTobList();
}
function setPackMethod(m, btn) {
  lab.packMethod = m;
  document.querySelectorAll('.pack-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderBowl();
}

function addTobacco(tob) {
  const used = lab.tobaccos.reduce((s,t)=>s+t.percentage,0);
  if (used >= 100) { showToast('Чаша уже заполнена'); return; }
  const color = COLORS[lab.tobaccos.length % COLORS.length];
  const pct = Math.min(100-used, Math.max(10, Math.round((100-used)/2/5)*5));
  lab.tobaccos.push({ ...tob, percentage: pct, color });
  closeTobSearch();
  renderTobList();
  renderBowl();
  updateLabDetails();
}

function removeTob(i) {
  lab.tobaccos.splice(i,1);
  renderTobList(); renderBowl(); updateLabDetails();
}

function updatePct(i, val) {
  lab.tobaccos[i].percentage = parseInt(val);
  document.getElementById(`pv${i}`).textContent = val+'%';
  const g = Math.round(lab.bowlSize*val/100*10)/10;
  document.getElementById(`tg${i}`).textContent = g+'г';
  const slider = document.getElementById(`ps${i}`);
  if (slider) slider.style.background = `linear-gradient(to right,${lab.tobaccos[i].color} ${val}%,var(--bg5) ${val}%)`;
  updatePctIndicator(); renderBowl(); updateLabDetails();
}

function updatePctIndicator() {
  const total = lab.tobaccos.reduce((s,t)=>s+t.percentage,0);
  const rem = 100-total;
  const el=document.getElementById('pctRem'), txt=document.getElementById('pctRemTxt'), g=document.getElementById('pctGauge');
  g.style.width = Math.min(total,100)+'%';
  if (total>100){el.className='pct-remaining over';txt.textContent=`Перебор на ${total-100}%`;g.className='pct-gauge-fill over';}
  else if(total===100){el.className='pct-remaining full';txt.textContent='✓ 100% — готово!';g.className='pct-gauge-fill';}
  else{el.className='pct-remaining';txt.textContent=`${rem}% свободно`;g.className='pct-gauge-fill';}
}

function renderTobList() {
  const list = document.getElementById('tobList');
  if (!lab.tobaccos.length) { list.innerHTML=''; updatePctIndicator(); return; }
  list.innerHTML = lab.tobaccos.map((t,i) => {
    const g = Math.round(lab.bowlSize*t.percentage/100*10)/10;
    return `<div class="tob-item">
      <div class="tob-item-top">
        <div class="tob-cdot" style="background:${t.color}"></div>
        <div style="flex:1"><div class="tob-name">${t.name}</div><div class="tob-brand">${t.brand}${t.strength?' · '+t.strength:''}</div></div>
        <div class="tob-grams" id="tg${i}">${g}г</div>
        <button class="tob-rm" onclick="removeTob(${i})">✕</button>
      </div>
      <div class="tob-pct-row">
        <input id="ps${i}" type="range" class="pct-slider" min="5" max="100" step="5" value="${t.percentage}"
          style="background:linear-gradient(to right,${t.color} ${t.percentage}%,var(--bg5) ${t.percentage}%)"
          oninput="updatePct(${i},this.value)">
        <div class="pct-val" id="pv${i}">${t.percentage}%</div>
      </div>
    </div>`;
  }).join('');
  updatePctIndicator();
}

function updateLabDetails() {
  const tobs = lab.tobaccos;
  if (!tobs.length) { document.getElementById('strLbl').textContent='—'; document.getElementById('labCoalLbl').textContent='—'; return; }
  const hasHard = tobs.some(t=>/dark.?side.*(torpedo|core)|хулиган.*hard/i.test(t.brand+' '+t.name)||/darkside|torpedo/i.test(t.brand));
  const hasLight = tobs.some(t=>/must.?have|bonche/i.test(t.brand));
  let coal = lab.bowlSize===20 ? (hasHard?'3 угля 5 мин':hasLight?'2–3 угля':'3 угля 4–5 мин') : (hasHard?'2–3 угля':hasLight?'2 угля':'2–3 угля');
  document.getElementById('labCoalLbl').textContent = coal;
  const total = tobs.reduce((s,t)=>s+t.percentage,0);
  const avg = tobs.reduce((s,t)=>s+(STR_MAP[t.strength?.toLowerCase()]||3)*t.percentage,0)/total;
  const col = avg<2?'#4ade80':avg<4?'#e8a23b':'#f06b6b';
  const lbl = avg<2?'🍃 Лёгкий':avg<4?'🔥 Средний':'💀 Крепкий';
  const filled = Math.round(avg);
  for(let i=0;i<5;i++) document.getElementById('sp'+i).style.background = i<filled?col:'var(--bg5)';
  document.getElementById('strLbl').textContent = lbl;
}

// ── TOBACCO SEARCH ──
let searchTimer = null;
function openTobSearch() {
  document.getElementById('tobModal').classList.add('open');
  document.getElementById('tobSearchInp').value = '';
  document.getElementById('tobResults').innerHTML = '<div class="loading"><div class="spinner"></div>Начни вводить название...</div>';
  setTimeout(()=>document.getElementById('tobSearchInp').focus(), 300);
}
function closeTobSearch() { document.getElementById('tobModal').classList.remove('open'); }

function searchTobaccos(q) {
  clearTimeout(searchTimer);
  if (q.length < 2) {
    document.getElementById('tobResults').innerHTML = '<div class="loading"><div class="spinner"></div>Начни вводить название...</div>';
    return;
  }
  document.getElementById('tobResults').innerHTML = '<div class="loading"><div class="spinner"></div>Ищу...</div>';
  searchTimer = setTimeout(async () => {
    try {
      const results = await api(`/api/tobaccos?q=${encodeURIComponent(q)}&in_stock=true&limit=25`);
      const el = document.getElementById('tobResults');
      if (!results.length) { el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3);font-size:0.83rem">Ничего не найдено</div>'; return; }
      const enc = r => JSON.stringify(r).replace(/"/g,'&quot;');
      el.innerHTML = results.map(r => {
        const icon = Object.entries(BRAND_ICONS).find(([k])=>r.brand?.includes(k))?.[1] || '🌿';
        const rating = r.avg_rating ? `⭐${parseFloat(r.avg_rating).toFixed(1)}` : '';
        const strength = r.strength_user || r.strength_official || '';
        return `<div class="search-item" onclick='pickTobacco(${enc(r)})'>
          <div class="search-item-ico">${icon}</div>
          <div style="flex:1"><div class="search-item-name">${r.flavor}</div><div class="search-item-brand">${r.brand}</div></div>
          ${rating?`<span class="search-item-rating">${rating}</span>`:''}
          ${strength?`<span class="search-item-badge">${strength}</span>`:''}
        </div>`;
      }).join('');
    } catch(e) { document.getElementById('tobResults').innerHTML = '<div style="padding:20px;text-align:center;color:var(--red);font-size:0.83rem">Ошибка поиска</div>'; }
  }, 350);
}

function pickTobacco(r) {
  addTobacco({
    tobacco_id: r.id,
    name: r.flavor,
    brand: r.brand,
    strength: r.strength_user || r.strength_official || 'средний',
  });
}

// ── SAVE MIX ──
async function saveMix() {
  if (!lab.tobaccos.length) { showToast('Добавь хотя бы один табак'); return; }
  if (!token) { openAuth(); return; }
  const name = document.getElementById('labMixName').value.trim() || 'Без названия';
  const total = lab.tobaccos.reduce((s,t)=>s+t.percentage,0);
  if (total !== 100) { showToast(`Сумма ${total}% — должно быть 100%`); return; }
  try {
    const res = await api('/api/mixes','POST',{
      name,
      bowl_type: lab.bowlSize===20?'убивашка':'фанел',
      bowl_grams: lab.bowlSize,
      pack_method: lab.packMethod,
      coal_tip: document.getElementById('labCoalLbl').textContent,
      strength: document.getElementById('strLbl').textContent.replace(/[🍃🔥💀]\s*/,''),
      items: lab.tobaccos.map((t,i)=>({
        tobacco_id: t.tobacco_id||null,
        tobacco_name: t.name,
        brand: t.brand,
        percentage: t.percentage,
        sort_order: i,
      })),
    });
    showToast('✦ Микс сохранён!');
    // Ask to share
    setTimeout(()=>{
      if(confirm('Поделиться в ленту?')) shareToFeed(res.id);
    },600);
  } catch(e) { showToast('Ошибка: '+e.message); }
}

async function shareToFeed(mixId) {
  if (!token) return;
  try {
    await api('/api/feed','POST',{mix_id:mixId,caption:''});
    showToast('🌿 Опубликовано в ленте!');
    loadFeed();
  } catch(e) {}
}

// ── PREVIEW ──
function previewCard() {
  if (!lab.tobaccos.length) { showToast('Добавь хотя бы один табак'); return; }
  const name = document.getElementById('labMixName').value||'Без названия';
  const total = lab.tobaccos.reduce((s,t)=>s+t.percentage,0);
  const svgHtml = buildMiniSvg(lab.tobaccos, total, 80, 40, 40, 35, 12);
  document.getElementById('previewBody').innerHTML = `
    <div style="background:var(--bg3);border-radius:18px;overflow:hidden;border:1px solid var(--border);margin-bottom:14px">
      <div style="padding:14px 16px;background:linear-gradient(135deg,rgba(157,111,255,0.18),rgba(61,214,172,0.09))">
        <div style="font-size:1.15rem;font-weight:700;margin-bottom:3px">${name}</div>
        <div style="font-size:0.76rem;color:var(--text2)">${document.getElementById('labBowlLbl').textContent} · ${document.getElementById('labCoalLbl').textContent} · ${document.getElementById('strLbl').textContent}</div>
      </div>
      <div style="padding:13px 15px;display:flex;gap:13px;align-items:center">
        ${svgHtml}
        <div style="flex:1;display:flex;flex-direction:column;gap:4px">
          ${lab.tobaccos.map(t=>{
            const g=Math.round(lab.bowlSize*t.percentage/100*10)/10;
            return `<div style="display:flex;align-items:center;gap:6px;font-size:0.76rem">
              <div style="width:7px;height:7px;border-radius:50%;background:${t.color};flex-shrink:0"></div>
              <span style="flex:1">${t.name} <span style="color:var(--text3)">${t.brand}</span></span>

        </div>
      </div>
      <div style="padding:9px 15px;border-top:1px solid var(--border);display:flex;gap:10px;font-size:0.71rem;color:var(--text3)">
        <span>🥧 ${lab.packMethod}</span><span>☕ ${document.getElementById('labBowlLbl').textContent}</span><span>🪨 ${document.getElementById('labCoalLbl').textContent}</span>
      </div>
    </div>
    <div style="display:flex;gap:9px">
      <button class="lab-btn lab-btn-secondary" style="flex:1" onclick="closePreview()">Изменить</button>
      <button class="lab-btn lab-btn-primary" style="flex:1" onclick="saveMix();closePreview()">✦ Сохранить</button>
    </div>`;
  document.getElementById('previewModal').classList.add('open');
}
function closePreview() { document.getElementById('previewModal').classList.remove('open'); }

function buildMiniSvg(tobs, total, size, cx, cy, outerR, innerR) {
  let h = `<circle cx="${cx}" cy="${cy}" r="${outerR}" fill="#161320"/>`;
  let a = -90;
  tobs.forEach(t => {
    const sw = (t.percentage/Math.max(total,100))*360;
    h += `<path d="${arcPath(cx,cy,outerR,innerR,a,a+sw-1)}" fill="${t.color}" opacity="0.9"/>`;
    a += sw;
  });
  h += `<circle cx="${cx}" cy="${cy}" r="${innerR}" fill="#161320"/>`;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0">${h}</svg>`;
}

// ── FEED ──
async function loadFeed() {
  const el = document.getElementById('feedList');
  try {
    const posts = await api('/api/feed?limit=20');
    if (!posts.length) {
      el.innerHTML = mockFeed();
      return;
    }
    el.innerHTML = posts.map(p => renderPost(p)).join('');
  } catch(e) {
    el.innerHTML = mockFeed();
  }
}

function renderPost(p) {
  const total = p.items.reduce((s,i)=>s+i.percentage,0)||100;
  const colors = p.items.map((_,i)=>COLORS[i%COLORS.length]);
  const svgHtml = buildMiniSvg(p.items.map((it,i)=>({...it,percentage:it.percentage,color:colors[i]})), total, 70, 35, 35, 30, 11);
  const tobs = p.items.map((it,i)=>`<div class="mcx-tob">
    <div class="mcx-dot" style="background:${colors[i]}"></div>
    <span class="mcx-tob-name">${it.tobacco_name} <span style="color:var(--text3)">${it.brand}</span></span>
    <span class="mcx-tob-pct">${it.percentage}%</span>
  </div>`).join('');
  return `<div class="card feed-post">
    <div class="post-header">
      <div class="post-avatar">${p.avatar||'🧔'}</div>
      <div style="flex:1"><div class="post-username">${p.username}</div><div class="post-time">${timeAgo(p.created_at)}</div></div>
      <div style="color:var(--text3);cursor:pointer">···</div>
    </div>
    <div class="mix-card-inner">
      <div class="mcx-head">
        <div class="mcx-name">${p.mix_name}</div>
        ${p.description?`<div class="mcx-desc">${p.description}</div>`:''}
        <div class="mcx-tags"><span class="mcx-tag">${p.bowl_type}</span><span class="mcx-tag">${p.pack_method}</span><span class="mcx-tag">${p.coal_tip||'—'}</span></div>
      </div>
      <div class="mcx-body">${svgHtml}<div class="mcx-tobaccos">${tobs}</div></div>
      <div class="mcx-footer"><span>💪 ${p.strength}</span><span>☕ ${p.bowl_type}</span></div>
    </div>
    <div class="post-actions">
      <button class="act-btn${p.i_liked?' liked':''}" id="lbtn${p.id}" onclick="toggleLike(${p.id},${p.mix_id},this)">
        ${p.i_liked?'❤️':'🤍'} ${p.likes_count||0}
      </button>
      <button class="act-btn" onclick="">💬</button>
      <button class="act-btn${p.i_saved?' saved':''}" id="sbtn${p.id}" onclick="toggleSave(${p.mix_id},this)" style="margin-left:auto">
        ${p.i_saved?'🔖':'📎'}

    </div>
  </div>`;
}

async function toggleLike(postId, mixId, btn) {
  if (!token) { openAuth(); return; }
  try {
    const res = await api(`/api/feed/${postId}/like`, 'POST');
    btn.className = 'act-btn' + (res.liked?' liked':'');
    btn.innerHTML = (res.liked?'❤️':'🤍') + ' ' + res.count;
  } catch(e) {}
}
async function toggleSave(mixId, btn) {
  if (!token) { openAuth(); return; }
  try {
    const res = await api(`/api/mixes/${mixId}/save`, 'POST');
    btn.className = 'act-btn' + (res.saved?' saved':'');
    btn.textContent = res.saved ? '🔖' : '📎';
  } catch(e) {}
}

            const sw=(it.percentage/total)*360;
            h+=`<path d="${arcPath(50,50,44,15,a,a+sw-1)}" fill="${COLORS[i%COLORS.length]}" opacity="0.9"/>`;
            a+=sw;
          });
          h+=`<circle cx="50" cy="50" r="15" fill="#1a1728"/>`;
          return h;
        })();
        return `<div class="mix-grid-item" onclick=""><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">${svgContent}</svg><div class="mix-grid-overlay"><div class="mix-grid-name">${m.name}</div></div></div>`;

  return `
    <div class="profile-cover">
      <svg class="profile-cover-art" viewBox="0 0 480 130" xmlns="http://www.w3.org/2000/svg">
        <circle cx="240" cy="65" r="110" fill="#9d6fff" opacity="0.35"/>
        <circle cx="80" cy="25" r="55" fill="#e8a23b" opacity="0.18"/>
        <circle cx="400" cy="100" r="75" fill="#3dd6ac" opacity="0.12"/>
      </svg>
    </div>
    <div class="profile-info">
      <div class="p-avatar">${d.avatar||'🧔'}</div>
      <div class="p-name">${d.username}</div>
      <div class="p-handle">@${d.username.toLowerCase().replace(/\s+/g,'_')}</div>
      ${d.bio?`<div class="p-bio">${d.bio}</div>`:''}
      <div class="p-stats">
        <div><div class="stat-n">${d.stats.mixes}</div><div class="stat-l">Миксов</div></div>
        <div><div class="stat-n">${d.stats.followers}</div><div class="stat-l">Подписчиков</div></div>
        <div><div class="stat-n">${d.stats.following}</div><div class="stat-l">Подписок</div></div>
      </div>
      <button class="p-edit-btn" onclick="editProfile()">Редактировать профиль</button>
    </div>
    <div class="p-section">
      <div class="p-section-title">Мой сетап <span class="p-section-add" onclick="editSetup()">изменить</span></div>
      <div class="setup-card">
        <div class="setup-row"><div class="setup-ico">🪔</div><div><div class="setup-lbl">Кальян</div><div class="setup-v${!d.setup?.hookah?' empty':''}">${d.setup?.hookah||'Не указан'}</div></div></div>
        <div class="setup-row"><div class="setup-ico">☕</div><div><div class="setup-lbl">Чаша</div><div class="setup-v${!d.setup?.bowl?' empty':''}">${d.setup?.bowl||'Не указана'}</div></div></div>
        <div class="setup-row"><div class="setup-ico">🪨</div><div><div class="setup-lbl">Угли</div><div class="setup-v${!d.setup?.coal?' empty':''}">${d.setup?.coal||'Не указаны'}</div></div></div>
      </div>
    </div>
    <div class="p-section">
      <div class="p-section-title">Мои табаки <span class="p-section-add" onclick="addTobToCabinet()">+ добавить</span></div>

    </div>

      <div class="p-section-title">Миксы</div>

    </div>`;
}

// ── AUTH ──
function openAuth() { document.getElementById('authModal').classList.add('open'); }
function closeAuth() { document.getElementById('authModal').classList.remove('open'); }
function switchAuthTab(tab, el) {
  document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('authLoginForm').style.display = tab==='login'?'block':'none';
  document.getElementById('authRegForm').style.display = tab==='register'?'block':'none';
}
async function doLogin() {
  const err = document.getElementById('loginErr');
  try {
    const res = await api('/api/auth/login','POST',{
      login: document.getElementById('loginVal').value,
      password: document.getElementById('loginPass').value,
    });
    token = res.token;
    currentUser = { username: res.username, id: res.user_id };
    localStorage.setItem('hl_token', token);
    localStorage.setItem('hl_user', JSON.stringify(currentUser));
    closeAuth();
    showToast('👋 Добро пожаловать, ' + res.username + '!');
    renderProfile();
  } catch(e) {
    err.style.display='block'; err.textContent = e.message;
  }
}
async function doRegister() {
  const err = document.getElementById('regErr');
  try {
    const res = await api('/api/auth/register','POST',{
      username: document.getElementById('regUser').value,
      email: document.getElementById('regEmail').value,
      password: document.getElementById('regPass').value,
    });
    token = res.token;
    currentUser = { username: res.username, id: res.user_id };
    localStorage.setItem('hl_token', token);
    localStorage.setItem('hl_user', JSON.stringify(currentUser));
    closeAuth();
    showToast('✦ Добро пожаловать в HookahLab!');
    renderProfile();
  } catch(e) {
    err.style.display='block'; err.textContent = e.message;
  }
}

// ── UTILS ──
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function timeAgo(iso) {
  const diff = (Date.now()-new Date(iso))/1000;
  if(diff<60) return 'только что';
  if(diff<3600) return Math.round(diff/60)+' мин назад';
  if(diff<86400) return Math.round(diff/3600)+' ч назад';
  return Math.round(diff/86400)+' д назад';
}
