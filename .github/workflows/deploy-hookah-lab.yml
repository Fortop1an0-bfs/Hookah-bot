name: Deploy HookahLab

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hookah-lab-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PROD_HOST: ${{ secrets.PROD_HOST }}
      PROD_USER: ${{ secrets.PROD_USER }}
    steps:
      - name: Validate secrets
        run: |
          set -euo pipefail
          test -n "${PROD_HOST}"
          test -n "${PROD_USER}"

      - name: Start ssh-agent and add deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -H "${PROD_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          set -euo pipefail
          ssh "${PROD_USER}@${PROD_HOST}" <<'EOSSH'
            set -euo pipefail

            echo "[deploy] sync git repo"
            cd /opt/hookah
            git fetch origin
            git checkout main
            git reset --hard origin/main

            echo "[deploy] copy runtime files"
            cp /opt/hookah/social/backend.py /opt/hookah-lab/backend.py
            cp /opt/hookah/social/templates/social.html /opt/hookah-lab/templates/social.html

            echo "[deploy] restart service"
            systemctl restart hookah-lab.service
            systemctl is-active --quiet hookah-lab.service
            systemctl --no-pager --full status hookah-lab.service | sed -n '1,20p'

            echo "[deploy] done"
          EOSSH
